<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <title>Twitter Clone</title>

  <!-- ✅ ТОЛЬКО рабочие CSS (убраны ВСЕ prefetch/preload) -->
  <link href="/css/chunk-vendors.de691de6.css" rel="stylesheet">
  <link href="/css/app.45d81840.css" rel="stylesheet">
  <link href="/css/chunk-0420bcc4.d6bc3184.css" rel="stylesheet">
  <link href="/css/chunk-10e0d5b4.130d80ef.css" rel="stylesheet">
  <link href="/css/chunk-6f77c742.8d9a3d9c.css" rel="stylesheet">
  <link href="/css/chunk-732a3e8c.6334cd6b.css" rel="stylesheet">
</head>

<!-- 🆕 API Key форма (для заказчика) -->
<div id="api-key-panel" style="position:fixed;top:20px;right:20px;z-index:9999;background:rgba(0,0,0,0.95);padding:20px;border-radius:12px;border:2px solid #1da1f2;max-width:300px;">
  <div style="font-weight:700;color:#1da1f2;margin-bottom:10px;font-size:16px;">🔑 API Ключ</div>
  <input id="api-key-input" placeholder="demo-key" style="width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:white;border-radius:8px;font-size:14px;margin-bottom:10px;box-sizing:border-box;">
  <div style="font-size:12px;color:#657786;margin-bottom:12px;line-height:1.4;">
    Тестовые ключи:<br>
    <code>demo-key</code><br>
    <code>user1-1234-5678-9abc-def012345678</code>
  </div>
  <button onclick="setApiKey()" style="width:100%;background:#1da1f2;color:white;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;">✅ Подключиться</button>
</div>

<script>
function setApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    alert('Введите api-key!');
    return;
  }
  localStorage.setItem('api-key', key);
  document.getElementById('api-key-panel').style.display = 'none';
  location.reload();
}

// Автозаполнение при наличии ключа
if (localStorage.getItem('api-key')) {
  document.getElementById('api-key-panel').style.display = 'none';
}
</script>

<body>
  <noscript>
    <strong>JavaScript отключен. Включите для работы Twitter Clone.</strong>
  </noscript>

  <div id="app">
    <!-- СТАТИЧЕСКИЙ Twitter UI (работает без JS) -->
    <div class="layout" style="display:flex;min-height:100vh;background:#000;">
      <!-- Sidebar -->
      <aside style="width:275px;background:#15202b;">
        <div style="padding:20px;font-size:2rem;color:#1da1f2;">X</div>
        <div style="padding:12px 20px;display:flex;font-weight:700;">🏠 Главная</div>
        <div style="position:absolute;bottom:20px;width:90%;padding:12px;background:#1da1f2;color:white;border-radius:999px;text-align:center;cursor:pointer;">Твитнуть</div>
      </aside>

      <!-- Feed -->
      <main style="flex:1;padding:20px;">
        <div style="display:flex;margin-bottom:20px;">
          <div style="width:48px;height:48px;background:#657786;border-radius:50%;margin-right:12px;"></div>
          <div style="flex:1;">
            <textarea style="width:100%;min-height:80px;background:transparent;border:none;color:white;font-size:16px;resize:vertical;" placeholder="Что происходит?"></textarea>
            <button style="background:#1da1f2;color:white;border:none;padding:8px 16px;border-radius:20px;font-weight:700;">Твитнуть</button>
          </div>
        </div>

        <!-- Твит -->
        <div style="display:flex;border-bottom:1px solid #333;padding:16px 0;">
          <div style="width:48px;height:48px;background:#657786;border-radius:50%;margin-right:12px;"></div>
          <div style="flex:1;">
            <div style="font-weight:700;margin-bottom:4px;">Иван Иванов <span style="color:#657786;">@ivanov</span> <span style="color:#657786;">1ч</span></div>
            <div style="margin-bottom:16px;color:white;">Привет! Twitter Clone работает! 🎉</div>
            <div style="display:flex;gap:20px;font-size:14px;">
              <span>💬 12</span>
              <span>🔄 34</span>
              <span style="color:#e0245e;">❤️ 56</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Vue.js JS (если нужен) -->
  <script src="/js/chunk-vendors.398321e0.js"></script>
  <script src="/js/app.ee2cdef2.js"></script>
</body>
</html>
